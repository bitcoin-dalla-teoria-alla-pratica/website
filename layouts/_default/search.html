{{ define "main" }}
<article class="post">
  <h1 class="post-title">{{ .Title }}</h1>

  <link href="/pagefind/pagefind-ui.css" rel="stylesheet">
  <script src="/pagefind/pagefind-ui.js"></script>

  <div id="search" style="margin-top: 2rem;"></div>

  <script>
    window.addEventListener('DOMContentLoaded', () => {
      new PagefindUI({
        element: "#search",
        showSubResults: true,
        resetStyles: false
      });
    });
  </script>
</article>
{{ end }}
