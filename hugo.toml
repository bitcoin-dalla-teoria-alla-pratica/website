baseURL = "https://corsobitcoin.com/"
languageCode = "it-it"
title = "Corso Bitcoin"
theme = "terminal"
pagination.pagerSize = 5
summaryLength = 70

enableRobotsTXT = true

[sitemap]
  changefreq = "weekly"
  priority = 0.5

[markup.highlight]
  noClasses = false

[markup.goldmark.renderer]
  unsafe = true

[params]
  contentTypeName = "posts"
  showMenuItems = 4
  showLanguageSelector = false
  fullWidthTheme = false
  centerTheme = true
  autoCover = true
  showLastUpdated = false
  homepageImage = "/img/bizantino.jpg"
  defaultTheme = "dark"

[languages]
  [languages.it]
    languageName = "Italiano"
    title = "Corso Bitcoin"

    [languages.it.params]
      subtitle = "Come funziona Bitcoin: protocollo, crittografia, transazioni e script — libri e articoli tecnici"
      owner = ""
      keywords = ""
      copyright = "© 2026 Bitcoin In Action"
      menuMore = "Mina ancora"
      readMore = "Apri il blocco"
      readOtherPosts = "Esplora la chain"
      newerPosts = "Blocchi recenti"
      olderPosts = "Blocchi precedenti"
      missingContentMessage = "Blocco orfano..."
      missingBackButtonLabel = "Torna al Genesis Block"
      minuteReadingTime = "min per validare"
      words = "bit"
      readingTime = true

      [languages.it.params.logo]
        logoText = "Corso ₿itcoin"
        logoHomeLink = "/"

      [languages.it.menu]
        [[languages.it.menu.main]]
          identifier = "posts"
          name = "Mempool"
          url = "/posts"
          weight = 1
        [[languages.it.menu.main]]
          identifier = "prodotti"
          name = "UTXO"
          url = "/prodotti"
          weight = 2
        [[languages.it.menu.main]]
          identifier = "about"
          name = "Genesis Block"
          url = "/chi-siamo"
          weight = 3
        [[languages.it.menu.main]]
          identifier = "tags"
          name = "Tags"
          url = "/tags"
          weight = 4
